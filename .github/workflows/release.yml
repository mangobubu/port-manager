name: 发布三端版本

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    name: ${{ matrix.display-name }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - display-name: macOS x64
            platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - display-name: macOS arm64
            platform: macos-14
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - display-name: Linux x64
            platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
          - display-name: Linux arm64
            platform: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu
          - display-name: Windows x64
            platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - display-name: Windows arm64
            platform: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc

    env:
      CARGO_TERM_COLOR: always
      MACOSX_DEPLOYMENT_TARGET: '14.0'

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Linux 构建依赖
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: 缓存 Rust 构建产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 构建并发布 Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Port Manager ${{ github.ref_name }}
          releaseBody: 三端 x64/arm64 安装包见本 Release 附件。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
